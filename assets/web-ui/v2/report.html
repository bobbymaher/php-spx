<html lang="en">
<head>
    <meta charset="utf-8">
    <title>SPX Report</title>
    <link rel="stylesheet" href="?SPX_UI_URI=/v2/css/main.css">
</head>
<body>
    <div id="init-report">
        <div>
            <h2>Initializing...</h2>
            <p></p>
            <div class="progress">
                <div style="width: 0%"></div>
            </div>
            <p></p>
        </div>
    </div>

    <div style="display: flex; flex-direction: column; height: 100%">
        <div style="flex: 0 0 24px; display: flex; flex-direction: row;">
            <div id="metric-selector" class="widget" style="flex: 0 0 120px;">
                <select></select>
            </div>
            <div id="color-scheme-selector" class="widget" style="flex: 0 0 300px;"></div>
            <div id="search-box" class="widget" style="flex: 0 0 300px;"></div>
        </div>
        <div id="overview" class="widget visualization" style="flex: 0 0 80px"></div>
        <div style="flex:1; min-height: 0; display: flex; flex-direction: column;">
            <div id="timeline" class="widget visualization" style="flex: 0 0 auto; height: 500px"></div>
            <div
                class="layout-splitter"
                data-layout-splitter-target="timeline"
                data-layout-splitter-axis="y"
                data-layout-splitter-dir="-1"
                data-layout-splitter-min="30"
            ></div>
            <div style="flex: 1; min-height: 0; display: flex; flex-direction: row;">
                <div id="flat-profile" class="widget" style="flex: 0 0 auto; width: 900px"></div>
                <div
                    class="layout-splitter"
                    data-layout-splitter-target="flat-profile"
                    data-layout-splitter-axis="x"
                    data-layout-splitter-dir="-1"
                    data-layout-splitter-min="500"
                ></div>
                <div id="flamegraph" class="widget visualization" style="flex: 1 1 auto"></div>
            </div>
        </div>
    </div>

    <script type="module" crossorigin>
        import {fmt, profileDataAnalyzer, widget, layoutSplitter} from './?SPX_UI_URI=/v2/js/spx.js';

        const {ProfileDataAnalyzerBuilder} = profileDataAnalyzer;

        document.addEventListener('DOMContentLoaded', () => {
            const m = window.location.href.match(/\bkey=([^&]+)/);
            if (!m) {
                return;
            }

            const key = m[1];
            let profileDataAnalyzerBuilder = null;

            const initDialog = {
                container: document.getElementById('init-report'),
                title: document.querySelector('#init-report p:nth-of-type(1)'),
                progressInfo: document.querySelector('#init-report p:nth-of-type(2)'),
                progress: document.querySelector('#init-report .progress'),
                progressBar: document.querySelector('#init-report .progress > div'),
                progressData: {}
            };

            function setProgress(title, current, total) {
                initDialog.title.innerHTML = title;

                if (!total) {
                    initDialog.progress.style.display = 'none';

                    return;
                }

                initDialog.progress.style.display = 'block';
                initDialog.progressBar.style.width = (
                    Math.round(100 * current / total) + '%'
                );

                const currentTime = performance.now();

                if (!(title in initDialog.progressData)) {
                    initDialog.progressData[title] = {
                        windowSamples: [
                            {
                                count: current,
                                time: currentTime
                            }
                        ]
                    };
                }

                const progressData = initDialog.progressData[title];

                const rate = (current - progressData.windowSamples[0].count) / ((currentTime - progressData.windowSamples[0].time) / 1000);
                const remainingTime = Math.round(
                    (total - current) / rate
                );

                while (
                    progressData.windowSamples.length > 2
                        && currentTime - progressData.windowSamples[0].time > 3000
                ) {
                    progressData.windowSamples.shift();
                }

                progressData.windowSamples.push({
                    count: current,
                    time: currentTime
                });

                initDialog.progressInfo.innerText = (
                    `${fmt.pct(current / total)} (${fmt.quantity(current)}, ${fmt.quantity(rate)}/s) ETA: ${remainingTime}s`
                );
            }

            fetch('?SPX_UI_URI=/data/metrics', {credentials: "same-origin"})
                .then(response => response.json())
                .then(response => {
                    profileDataAnalyzerBuilder = new ProfileDataAnalyzerBuilder(response.results);

                    return fetch('?SPX_UI_URI=/data/reports/metadata/' + key, {credentials: "same-origin"});
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Cannot load report metadata');
                    }

                    return response.json();
                })
                .then(metadata => {
                    profileDataAnalyzerBuilder.setMetadata(metadata);

                    return fetch('?SPX_UI_URI=/data/reports/get/' + key, {credentials: "same-origin"});
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Cannot load report');
                    }

                    console.time('Call list building');

                    let type = null;
                    let currentFunctionIdx = 0;
                    let lastTruncatedLine = '';
                    let lastEvents = [];

                    const decoder = new TextDecoder('ascii');

                    function readBuffer(buffer) {
                        if (buffer.length == 0) {
                            return;
                        }

                        const lines = decoder.decode(buffer).split("\n");
                        lines[0] = lastTruncatedLine + lines[0];
                        lastTruncatedLine = lines.pop();

                        for (const line of lines) {
                            if (line == '[events]') {
                                type = 'event';

                                continue;
                            }

                            if (line == '[functions]') {
                                type = 'function';

                                continue;
                            }

                            if (type == 'event') {
                                let event;
                                if (line.includes(' ')) {
                                    // legacy format
                                    event = line.split(' ').map(e => Number(e));
                                } else {
                                    // compressed format
                                    const start = line[0] !== '-';
                                    const parts = line.split('|');

                                    // ignoring call site line at offset 0 if start
                                    const startOffset = start ? 1 : 0;

                                    event = Array(parts.length + 1 - startOffset);
                                    for (let i = startOffset; i < parts.length; i++) {
                                        let v = parts[i];
                                        if (i === startOffset) {
                                            if (! start) {
                                                // remove the leading '-'
                                                v = v.slice(1);
                                            }

                                            if (v[0] === 'r') {
                                                v = lastEvents[Number(v.slice(1)) - 1][i - startOffset];
                                            } else {
                                                v = Number(v);
                                            }

                                            event[0] = v;
                                            event[1] = start ? 1 : 0;
                                        } else {
                                            if (v === '') {
                                                v = '0';
                                            }

                                            if (v[0] === 'a') {
                                                v = Number(v.slice(1));
                                            } else {
                                                v = Number(v) + lastEvents[0][i - startOffset + 1];
                                            }

                                            event[i - startOffset + 1] = v;
                                        }
                                    }

                                    lastEvents.unshift(event);
                                    if (lastEvents.length > 20) {
                                        lastEvents.length = 20;
                                    }
                                }

                                profileDataAnalyzerBuilder.addEvent(event);

                                continue;
                            }

                            if (type == 'function') {
                                const parts = line.split(':');
                                const file = parts.shift();
                                const lineNumber = Number(parts.shift());

                                let functionName = parts.join(':');
                                if (functionName === '{closure}') {
                                    functionName = `{closure:${file}:${lineNumber}}`;
                                }

                                profileDataAnalyzerBuilder.setFunctionName(
                                    currentFunctionIdx++,
                                    functionName
                                );

                                continue;
                            }
                        }

                        setProgress(
                            'Building call list... (1/2)<br>'
                                + `${fmt.quantity(profileDataAnalyzerBuilder.getTotalCallCount())} function calls`
                            ,
                            profileDataAnalyzerBuilder.getCurrentCallCount(),
                            profileDataAnalyzerBuilder.getTotalCallCount()
                        );
                    }

                    if (!response.body) {
                        return response.arrayBuffer().then(buffer => {
                            const blockSize = 256 * 1024;
                            const readBlocks = (offset, resolve) => {
                                if (buffer.byteLength - offset <= blockSize) {
                                    readBuffer(new Uint8Array(buffer, offset));

                                    return new Promise(() => resolve());
                                }

                                readBuffer(new Uint8Array(buffer, offset, blockSize));

                                setTimeout(() => readBlocks(offset + blockSize, resolve), 0);
                            }

                            return new Promise(resolve => {
                                setTimeout(() => readBlocks(0, resolve), 0);
                            });
                        });
                    }

                    const reader = response.body.getReader();
                    const streamHandler = status => {
                        if (status.value) {
                            readBuffer(status.value);
                        }

                        if (!status.done) {
                            return reader.read().then(streamHandler);
                        }

                        return new Promise(resolve => resolve());
                    }

                    return reader.read().then(streamHandler);
                })
                .then(() => {
                    console.timeEnd('Call list building');
                    return profileDataAnalyzerBuilder.buildCallRangeTree(
                        (current, total) => setProgress(
                            `Building call range tree... (2/2)<br>${fmt.quantity(total)} function calls`,
                            current,
                            total
                        )
                    );
                })
                .then(() => {
                    initDialog.title.innerText = 'Initializing widgets...';

                    return new Promise(resolve => resolve(profileDataAnalyzerBuilder.getProfileDataAnalyzer()));
                })
                .then(profileDataAnalyzer => {
                    const metricSelector = document.querySelector('#metric-selector select');

                    for (const metric of profileDataAnalyzer.getMetadata().enabled_metrics) {
                        const option = document.createElement('option');
                        option.value = metric;
                        option.textContent = profileDataAnalyzer.getMetricInfo(metric).name;
                        metricSelector.appendChild(option);
                    }

                    const widgets = [
                        new widget.ColorSchemeSelector(document.getElementById('color-scheme-selector'), profileDataAnalyzer),
                        new widget.SearchBox(document.getElementById('search-box'), profileDataAnalyzer),
                        new widget.OverView(document.getElementById('overview'), profileDataAnalyzer),
                        new widget.TimeLine(document.getElementById('timeline'), profileDataAnalyzer),
                        new widget.FlatProfile(document.getElementById('flat-profile'), profileDataAnalyzer),
                        new widget.FlameGraph(document.getElementById('flamegraph'), profileDataAnalyzer),
                    ];

                    widgets.forEach(widget => widget.render());

                    metricSelector.addEventListener('change', () => {
                        const value = metricSelector.value;
                        widgets.forEach(widget => widget.setCurrentMetric(value));
                        widgets.forEach(widget => widget.repaint());
                    });

                    layoutSplitter.init();

                    layoutSplitter.change(() => {
                        widgets.forEach(widget => {
                            if (!["timeline", "flat-profile", "flamegraph"].includes(widget.container.id)) {
                                return;
                            }

                            widget.handleResize();
                        });
                    });

                    return Promise.resolve();
                })
                .then(() => {
                    initDialog.container.style.transition = 'opacity 500ms ease';
                    initDialog.container.style.opacity = '0';

                    setTimeout(() => {
                        initDialog.container.style.display = 'none';
                    }, 500);
                })
                .catch(e => {
                    initDialog.progressInfo.innerText = e;
                    console.error(e)
                })
            ;
        });
    </script>
</body>
</html>
